kind = "web"
previewPath = "/"
title = "ResumeMint AI"
version = "1.0.0"
id = "artifacts/resume-mint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22264

[services.development]
run = "pnpm --filter @workspace/resume-mint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-mint", "run", "build" ]
publicDir = "artifacts/resume-mint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22264"
BASE_PATH = "/"
